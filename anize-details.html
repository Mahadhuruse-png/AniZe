<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniZe — Anime Details</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000; --bg2: #0a0a0a; --bg3: #111;
  --border: #1c1c1c; --border2: #2a2a2a;
  --text: #fff; --text2: #888; --text3: #555;
  --accent: #fff; --nav-h: 58px;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; }
a { text-decoration: none; color: inherit; }

nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(0,0,0,0.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); z-index: 100; display: flex; align-items: center; padding: 0 2rem; gap: 2rem; }
.nav-logo { font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 900; color: var(--text); letter-spacing: 0.06em; flex-shrink: 0; }
.nav-links { display: flex; align-items: center; gap: 0.2rem; list-style: none; }
.nav-links a { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text3); padding: 0.4rem 0.75rem; border-radius: 4px; transition: color 0.2s, background 0.2s; text-transform: uppercase; }
.nav-links a:hover { color: var(--text); background: var(--bg3); }
.nav-search { flex: 1; max-width: 520px; margin-left: auto; position: relative; }
.nav-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.78rem; padding: 0.45rem 0.9rem 0.45rem 2.2rem; border-radius: 4px; outline: none; transition: border-color 0.2s; }
.nav-search input::placeholder { color: var(--text3); }
.nav-search svg { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--text3); fill: none; pointer-events: none; }
.nav-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
.btn-login { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bg); background: var(--text); border: none; padding: 0.42rem 1rem; border-radius: 3px; cursor: pointer; transition: opacity 0.2s; }
.btn-login:hover { opacity: 0.85; }

/* HERO BANNER */
.details-hero {
  margin-top: var(--nav-h);
  position: relative;
  height: 340px;
  overflow: hidden;
  background: var(--bg2);
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center 20%;
  filter: blur(18px) brightness(0.25) saturate(1.2);
  transform: scale(1.05);
}
.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: flex-end;
  padding: 0 3rem 2rem;
  gap: 2rem;
}
.hero-poster {
  width: 150px;
  height: 220px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  background: var(--bg3);
}
.hero-text { flex: 1; min-width: 0; padding-bottom: 0.2rem; }
.hero-type-badge {
  display: inline-block;
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #888;
  border: 1px solid #333;
  padding: 0.2rem 0.5rem;
  border-radius: 2px;
  margin-bottom: 0.6rem;
}
.hero-title {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.03em;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 0.6rem;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
}
.hero-title-jp { font-size: 0.75rem; color: #444; margin-bottom: 0.8rem; font-style: italic; }
.hero-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
.hero-pill { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.22rem 0.55rem; border: 1px solid #333; border-radius: 2px; color: #666; }
.hero-pill.score { color: #f5c842; border-color: rgba(245,200,66,0.3); }
.hero-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
.btn-watch {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #000; background: #fff; border: none; padding: 0.6rem 1.4rem;
  border-radius: 3px; cursor: pointer; transition: opacity 0.2s; flex-shrink: 0;
}
.btn-watch:hover { opacity: 0.85; }
.btn-watchlist {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: #888; background: transparent; border: 1px solid #333; padding: 0.6rem 1.2rem;
  border-radius: 3px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.btn-watchlist:hover { color: #fff; border-color: #555; }

/* CONTENT AREA */
.content-wrap {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 0;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 2rem 3rem;
  align-items: start;
}

.main-col { padding-right: 2rem; }

/* SECTION */
.section { margin-bottom: 2.5rem; }
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.6rem;
  margin-bottom: 1rem;
}
.synopsis-text { font-size: 0.79rem; line-height: 1.85; color: #888; }

/* CHARACTERS */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.6rem;
}
.char-card {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg2);
  cursor: pointer;
  transition: border-color 0.2s;
}
.char-card:hover { border-color: var(--border2); }
.char-img {
  width: 40px; height: 56px;
  object-fit: cover; border-radius: 2px;
  background: var(--bg3); flex-shrink: 0;
}
.char-name { font-size: 0.65rem; font-weight: 500; color: #888; line-height: 1.3; }
.char-role { font-size: 0.55rem; color: #444; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.2rem; }

/* INFO SIDEBAR */
.info-sidebar { position: sticky; top: calc(var(--nav-h) + 1.5rem); }
.info-block {
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 1.2rem;
  background: var(--bg2);
}
.info-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  font-size: 0.7rem;
}
.info-row:last-child { border-bottom: none; }
.info-key {
  width: 95px;
  flex-shrink: 0;
  padding: 0.55rem 0.8rem;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  background: var(--bg3);
  border-right: 1px solid var(--border);
}
.info-val {
  padding: 0.55rem 0.8rem;
  color: #888;
  font-size: 0.7rem;
  line-height: 1.4;
  flex: 1;
}

/* RELATED GRID */
.related-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}
.rel-card {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
  background: var(--bg2);
}
.rel-card:hover { border-color: var(--border2); }
.rel-thumb {
  width: 100%; aspect-ratio: 3/4;
  object-fit: cover;
  background: var(--bg3);
}
.rel-info { padding: 0.45rem 0.5rem; }
.rel-title { font-size: 0.65rem; font-weight: 500; color: #888; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rel-type { font-size: 0.55rem; color: #444; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.2rem; }

/* LOADING */
@keyframes shimmer { 0% { background-position: -700px 0; } 100% { background-position: 700px 0; } }
.skeleton { background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); background-size: 700px 100%; animation: shimmer 1.4s infinite; border-radius: 2px; }

/* BREADCRUMB */
.breadcrumb { padding: 0.8rem 3rem; font-size: 0.64rem; color: var(--text3); display: flex; align-items: center; gap: 0.4rem; border-bottom: 1px solid var(--border); background: var(--bg2); }
.breadcrumb a { color: var(--text3); transition: color 0.2s; }
.breadcrumb a:hover { color: var(--text); }
.breadcrumb span { color: #333; }

@media (max-width: 900px) {
  .content-wrap { grid-template-columns: 1fr; padding: 1.2rem; }
  .main-col { padding-right: 0; }
  .hero-content { padding: 0 1.2rem 1.5rem; }
  .hero-title { font-size: 1.3rem; }
  .hero-poster { width: 100px; height: 150px; }
  .info-sidebar { position: static; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="anize-splash.html" class="nav-logo">AniZe</a>
  <ul class="nav-links">
    <li><a href="anize-home.html">Home</a></li>
    <li><a href="anize-browse.html">New</a></li>
    <li><a href="anize-ongoing.html">Ongoing</a></li>

  <div class="nav-search">

</div>

<!-- HERO -->
<div class="details-hero" id="detailsHero">

    <div class="hero-poster skeleton" id="heroPosterSkel"></div>

      <div class="skeleton" style="height:0.7rem;width:60px;margin-bottom:0.7rem"></div>
      <div class="skeleton" style="height:2rem;width:55%;margin-bottom:0.5rem"></div>
      <div class="skeleton" style="height:0.75rem;width:35%;margin-bottom:1rem"></div>

        <div class="skeleton" style="height:1rem;width:55px"></div>
        <div class="skeleton" style="height:1rem;width:70px"></div>
        <div class="skeleton" style="height:1rem;width:50px"></div>
      </div>
      <div style="display:flex;gap:0.6rem">
        <div class="skeleton" style="height:2rem;width:100px;border-radius:3px"></div>
        <div class="skeleton" style="height:2rem;width:110px;border-radius:3px"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content-wrap">
  <div class="main-col">

    <!-- SYNOPSIS -->
    <div class="section" id="sectionSynopsis" style="display:none">
      <div class="section-title">Synopsis</div>
      <p class="synopsis-text" id="synopsisText"></p>
    </div>

    <!-- CHARACTERS -->
    <div class="section" id="sectionChars" style="display:none">
      <div class="section-title">Characters</div>
      <div class="char-grid" id="charGrid"></div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="info-sidebar">

    <div class="section-title" style="margin-bottom:0.8rem">Information</div>
    <div class="info-block" id="infoBlock">
      <div class="skeleton" style="height:200px"></div>
    </div>

    <div class="section-title" style="margin-bottom:0.8rem;margin-top:1.5rem">Related</div>
    <div class="related-grid" id="relatedGrid">
      <div class="skeleton" style="height:160px;border-radius:3px"></div>
      <div class="skeleton" style="height:160px;border-radius:3px"></div>
      <div class="skeleton" style="height:160px;border-radius:3px"></div>
      <div class="skeleton" style="height:160px;border-radius:3px"></div>
    </div>

  </div>
</div>
