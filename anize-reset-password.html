<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniZe — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --bg2: #0a0a0a;
  --bg3: #111;
  --border: #1c1c1c;
  --border2: #2a2a2a;
  --text: #fff;
  --text2: #888;
  --text3: #555;
  --nav-h: 58px;
}

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }

nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(0,0,0,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  z-index: 100;
  display: flex; align-items: center; padding: 0 2rem; gap: 2rem;
}
.nav-logo { font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 900; letter-spacing: 0.06em; }

.page {
  min-height: 100vh;
  padding-top: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 50%, #0d0d0d 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 30%, #0a0a0a 0%, transparent 60%);
  pointer-events: none;
}

.card {
  position: relative;
  z-index: 2;
  background: var(--bg2);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 400px;
  padding: 2.2rem 2rem 2rem;
  margin: 2rem;
}
.card-header { margin-bottom: 1.6rem; }
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem; font-weight: 900;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text); margin-bottom: 0.3rem;
}
.card-sub { font-size: 0.72rem; color: var(--text3); letter-spacing: 0.02em; }

.form { display: flex; flex-direction: column; gap: 0.75rem; }
.input-wrap { position: relative; }
.input-wrap input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.78rem;
  padding: 0.75rem 1rem; border-radius: 3px; outline: none; transition: border-color 0.2s;
}
.input-wrap input:focus { border-color: var(--border2); }
.input-wrap input::placeholder { color: var(--text3); }
.input-wrap .eye-btn {
  position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 0; display: flex; align-items: center; transition: color 0.2s;
}
.input-wrap .eye-btn:hover { color: var(--text2); }
.input-wrap .eye-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

.submit-btn {
  width: 100%; background: var(--text); color: var(--bg); border: none;
  padding: 0.75rem; font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
  border-radius: 3px; margin-top: 0.3rem; transition: opacity 0.2s;
}
.submit-btn:hover { opacity: 0.88; }

.switch-row { text-align: center; font-size: 0.68rem; color: var(--text3); margin-top: 1rem; letter-spacing: 0.02em; }
.switch-row a { color: var(--text); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }

.msg {
  font-size: 0.68rem; padding: 0.6rem 0.8rem; border-radius: 3px;
  display: none; letter-spacing: 0.02em;
}
.msg.error { background: #1a0000; border: 1px solid #3a0000; color: #ff6b6b; display: block; }
.msg.success { background: #001a00; border: 1px solid #003a00; color: #6bff6b; display: block; }
</style>
</head>
<body>

<nav>
  <a href="anize-home.html" class="nav-logo">AniZe</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Reset Password</div>
      <div class="card-sub" id="cardSub">Enter a new password for your account.</div>
    </div>
    <div class="form">
      <div id="reset-msg" class="msg"></div>
      <div class="input-wrap">
        <input type="password" id="new-pass" placeholder="New Password"/>
        <button class="eye-btn" onclick="togglePass('new-pass', this)">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="input-wrap">
        <input type="password" id="new-pass2" placeholder="Confirm New Password"/>
        <button class="eye-btn" onclick="togglePass('new-pass2', this)">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button id="btn-reset" class="submit-btn" onclick="handleReset()">Reset Password</button>
      <div class="switch-row">Remembered it? <a href="anize-login.html">Sign in</a></div>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
const resetToken = new URLSearchParams(window.location.search).get('token');

if (!resetToken) {
  document.getElementById('cardSub').textContent = 'This reset link is missing or invalid.';
  document.getElementById('btn-reset').disabled = true;
  document.getElementById('btn-reset').style.opacity = '0.4';
  document.getElementById('btn-reset').style.cursor = 'not-allowed';
}

function togglePass(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

async function handleReset() {
  if (!resetToken) return;
  const pass = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;

  showMsg('reset-msg', '', '');
  if (!pass || !pass2) { showMsg('reset-msg', 'Please fill in both fields.', 'error'); return; }
  if (pass !== pass2) { showMsg('reset-msg', 'Passwords do not match.', 'error'); return; }
  if (pass.length < 6) { showMsg('reset-msg', 'Password must be at least 6 characters.', 'error'); return; }

  const btn = document.getElementById('btn-reset');
  btn.textContent = 'Please wait…';
  btn.style.opacity = '0.6';

  try {
    await AniZeAuth.resetPassword(resetToken, pass);
    showMsg('reset-msg', 'Password updated! Redirecting to sign in…', 'success');
    setTimeout(() => { window.location.href = 'anize-login.html'; }, 1200);
  } catch (err) {
    showMsg('reset-msg', err.message || 'This reset link is invalid or has expired.', 'error');
    btn.textContent = 'Reset Password';
    btn.style.opacity = '1';
  }
}
</script>

</body>
</html>
